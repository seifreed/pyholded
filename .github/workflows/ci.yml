name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: Static gate (lint/format/types/security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Format (black)
        run: python -m black --check --diff .
      - name: Types (mypy --strict)
        run: python -m mypy
      - name: Security (bandit)
        run: python -m bandit -rq src -c pyproject.toml
      - name: Dead code (vulture)
        run: python -m vulture src/
      - name: Dependency audit (pip-audit)
        run: python -m pip_audit -r requirements.lock --strict

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests (pytest)
        run: python -m pytest

  sbom:
    name: SBOM + quality score
    runs-on: ubuntu-latest
    needs: [gate, test]
    env:
      COSIGN_PASSWORD: ""
      SBOM_MIN_SCORE: "9.0"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install sbomqs
        run: |
          curl -sSfL https://raw.githubusercontent.com/interlynk-io/sbomqs/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v3.1.0'
      - name: Generate signing key (ephemeral)
        run: |
          mkdir -p signing
          (cd signing && cosign generate-key-pair)
          cosign signing-config create --out signing/signing-config.json
      - name: Generate signed SBOM
        run: python scripts/generate_sbom.py --sign --signing-dir signing --output sbom.cdx.json
      - name: Score SBOM (fail below threshold)
        run: |
          sbomqs score sbom.cdx.json
          score=$(sbomqs score sbom.cdx.json --basic | cut -f1)
          awk -v s="$score" -v m="$SBOM_MIN_SCORE" 'BEGIN { exit (s+0 < m+0) }' \
            || { echo "SBOM score $score below $SBOM_MIN_SCORE"; exit 1; }
      - name: Verify SBOM signature
        run: |
          python -c "import json; d=json.load(open('sbom.cdx.json')); d.pop('signature',None); open('.sbom-canon.json','wb').write(json.dumps(d,sort_keys=True,separators=(',',':')).encode())"
          cosign verify-blob --key signing/cosign.pub --bundle sbom.cdx.json.bundle --offline --insecure-ignore-tlog .sbom-canon.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            sbom.cdx.json
            sbom.cdx.json.bundle
